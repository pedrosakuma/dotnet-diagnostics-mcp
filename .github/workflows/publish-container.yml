name: Publish container image

# Builds the MCP server container and publishes it to GitHub Container Registry
# (ghcr.io/${owner}/${repo}). Two variants are published per tag:
#   - <tag>         — full image (includes Linux perf for off-CPU sampling / NativeAOT fallback)
#   - <tag>-lean    — same image WITHOUT perf (~80 MB smaller; disables collect_off_cpu_sample
#                     and the perf-replay thread-snapshot fallback on Linux)
#
# Tag taxonomy (note: docker/metadata-action's semver patterns strip the leading 'v'):
#   - push to main             → :main, :edge, :sha-<shortsha>
#   - push to tag vX.Y.Z       → :X.Y.Z, :X.Y, :X, :latest
#   - manual workflow_dispatch → :<input-tag>
# Lean variant publishes the same tags with a '-lean' suffix appended.
#
# Multi-arch strategy:
#   - Four parallel `build` jobs (one per {variant} × {linux/amd64, linux/arm64})
#     each run on the architecture's native GitHub-hosted runner (ubuntu-latest
#     for amd64, ubuntu-24.04-arm for arm64). Native runners avoid QEMU and cut
#     the arm64 leg from ~6-10 min to ~1-2 min.
#   - Each build job emits a single-platform image digest (no tags) and uploads
#     it as an artifact.
#   - Two `merge` jobs (one per variant) collect the digests for their variant,
#     compute the final tag list with docker/metadata-action, and call
#     `docker buildx imagetools create` to assemble a multi-arch manifest and
#     push it to GHCR.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish (e.g. "preview-2026-05-19"). The "-lean" variant is appended automatically.'
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build digest (${{ matrix.variant }}, ${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { variant: lean, install_perf: 'false', platform: linux/amd64, runner: ubuntu-latest }
          - { variant: lean, install_perf: 'false', platform: linux/arm64, runner: ubuntu-24.04-arm }
          - { variant: perf, install_perf: 'true',  platform: linux/amd64, runner: ubuntu-latest }
          - { variant: perf, install_perf: 'true',  platform: linux/arm64, runner: ubuntu-24.04-arm }
    steps:
      - uses: actions/checkout@v4

      - name: Derive platform suffix
        id: pp
        shell: bash
        run: |
          platform="${{ matrix.platform }}"
          echo "pair=${platform//\//-}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: ${{ matrix.platform }}
          # push-by-digest=true publishes the single-platform manifest under its
          # content-addressable digest only — no tag is created at this stage.
          # The merge job below stitches the digests into the final multi-arch tags.
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          build-args: |
            INSTALL_PERF=${{ matrix.install_perf }}
          cache-from: type=gha,scope=container-${{ matrix.variant }}-${{ steps.pp.outputs.pair }}
          cache-to: type=gha,scope=container-${{ matrix.variant }}-${{ steps.pp.outputs.pair }},mode=max
          provenance: true
          sbom: true

      - name: Export digest
        shell: bash
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.variant }}-${{ steps.pp.outputs.pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge manifest (${{ matrix.variant }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { variant: lean, suffix: '-lean' }
          - { variant: perf, suffix: '' }
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.variant }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            suffix=${{ matrix.suffix }},onlatest=true
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,format=short,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
          labels: |
            org.opencontainers.image.title=dotnet-diagnostics-mcp
            org.opencontainers.image.description=MCP server for on-demand .NET diagnostics over the runtime IPC socket (${{ matrix.variant }} variant)
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Create & push multi-arch manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("--tag " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s " *)

      - name: Inspect pushed manifest
        run: |
          docker buildx imagetools inspect "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}"
