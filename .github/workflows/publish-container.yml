name: Publish container image

# Builds the MCP server container and publishes it to GitHub Container Registry
# (ghcr.io/${owner}/${repo}). Two variants are published per tag:
#   - <tag>         — lean image (no Linux perf tools)
#   - <tag>-perf    — same image plus `linux-perf` for NativeAOT / off-CPU sampling
#
# Tag taxonomy:
#   - push to main             → :main, :edge, :sha-<shortsha>
#   - push to tag vX.Y.Z       → :vX.Y.Z, :X.Y, :X, :latest
#   - manual workflow_dispatch → :<input-tag>
#
# Multi-arch: linux/amd64 + linux/arm64 via QEMU + buildx. GHA cache keeps
# subsequent builds under 2 minutes.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish (e.g. "preview-2026-05-19"). The "-perf" variant is appended automatically.'
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish:
    name: Build & push (${{ matrix.variant }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: lean
            install_perf: 'false'
            suffix: ''
          - variant: perf
            install_perf: 'true'
            suffix: '-perf'
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            suffix=${{ matrix.suffix }},onlatest=true
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,format=short,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
          labels: |
            org.opencontainers.image.title=dotnet-diagnostics-mcp
            org.opencontainers.image.description=MCP server for on-demand .NET diagnostics over the runtime IPC socket (${{ matrix.variant }} variant)
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            INSTALL_PERF=${{ matrix.install_perf }}
          cache-from: type=gha,scope=container-${{ matrix.variant }}
          cache-to: type=gha,scope=container-${{ matrix.variant }},mode=max
          provenance: true
          sbom: true
