name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel in-progress runs for the same PR when a new commit is pushed.
# main is excluded so a fast-follow merge after a green PR still gets recorded.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Setup .NET 10
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json

      # NuGet package cache. Without a packages.lock.json we key on the central
      # version manifest + every project file — any package add / version bump
      # invalidates correctly. Saves ~10-25s per job.
      - name: Cache NuGet packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      # `--blame-hang-timeout 5m` aborts any single test that hangs longer than
      # five minutes (live sample-process tests usually take ~10s; the longest
      # observed legitimate test is well under a minute). Prevents the whole CI
      # job from burning a full 6h budget on a stuck collector.
      #
      # The two test assemblies are run as separate steps (rather than a single
      # `dotnet test` at the solution level) so that MSBuild does NOT run them
      # in parallel. Both assemblies spawn live child .NET processes and open
      # EventPipe sessions; running them concurrently on the 4-vCPU runner has
      # been observed to crash the Core test host under load (issue #147).
      # Intra-assembly parallelism is preserved (each `[Collection]` with
      # DisableParallelization=true still serializes its own live tests).
      #
      # `--blame-crash --blame-crash-dump-type full` keeps a dump around the
      # next time a test host actually dies, so future investigations don't
      # have to push a CI-only repro PR just to capture state.
      - name: Test (Core)
        run: dotnet test tests/DotnetDiagnosticsMcp.Core.Tests/DotnetDiagnosticsMcp.Core.Tests.csproj --no-build --configuration Release --blame-hang-timeout 5m --blame-hang-dump-type none --blame-crash --blame-crash-dump-type full --logger "trx;LogFileName=core-test-results.trx" --results-directory TestResults

      - name: Test (Server integration)
        run: dotnet test tests/DotnetDiagnosticsMcp.Server.IntegrationTests/DotnetDiagnosticsMcp.Server.IntegrationTests.csproj --no-build --configuration Release --blame-hang-timeout 5m --blame-hang-dump-type none --blame-crash --blame-crash-dump-type full --filter "Category!=KindIntegration" --logger "trx;LogFileName=server-test-results.trx" --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: test-results-${{ matrix.os }}
          path: |
            **/TestResults/*.trx
            **/TestResults/**/*.dmp
          if-no-files-found: ignore
