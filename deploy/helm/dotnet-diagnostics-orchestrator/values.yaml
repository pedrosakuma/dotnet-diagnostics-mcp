image:
  repository: ghcr.io/pedrosakuma/dotnet-diagnostics-mcp
  tag: ""
  pullPolicy: IfNotPresent

# Resource namespace override. Leave empty to use the Helm release namespace.
namespace: ""

rbac:
  create: true
  # H2 (issue #162): default to namespace-scoped Role + RoleBinding. Set to
  # `cluster` only if the orchestrator must observe / attach to Pods across
  # multiple namespaces — it widens blast radius if the bearer is compromised.
  scope: namespace

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  # L (issue #162): the orchestrator writes nothing under the root filesystem at
  # runtime. Dumps and trace files land under MCP_ARTIFACT_ROOT (defaults to the
  # OS temp dir), so we mount an emptyDir at /tmp below.
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# emptyDir volumes mounted into the orchestrator container. /tmp is the default
# target for diagnostic artifacts when readOnlyRootFilesystem is on.
extraVolumes:
  - name: tmp
    emptyDir: {}
extraVolumeMounts:
  - name: tmp
    mountPath: /tmp

service:
  type: ClusterIP
  port: 5130

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

bearerToken:
  # Use an existing Secret with key `token` when set.
  existingSecret: ""
  # Replace before production, or prefer existingSecret.
  value: replace-me-with-a-strong-random-token

orchestrator:
  enabled: true
  # Leave empty to default to the chart namespace.
  defaultNamespace: ""
  # Leave empty to scope list_pods / attach_to_pod to the chart namespace.
  allowedNamespaces: []
  labelKeyAllowlist:
    - diagnostics.dotnet.io/prepared
    - app
    - app.kubernetes.io/name
  preparedLabelKey: diagnostics.dotnet.io/prepared
  requirePreparedLabel: true
  # Leave empty to reuse image.repository:image.tag for injected ephemeral containers.
  ephemeralContainerImage: ""
  attachReadinessTimeoutSeconds: 60
  defaultInvestigationTtlSeconds: 1800
  proxyPodPort: 5130
  # B3 (#164): when true, operators (e.g. central orchestrators or test
  # harnesses) may list and proxy handles minted by other MCP sessions.
  # Default false — every caller sees only its own handles and the proxy
  # rejects cross-session access with a structured 403 ProxyOwnerMismatch.
  allowCrossSessionAdmin: false

nodeSelector: {}
tolerations: []
affinity: {}

# H8 (issue #162): TLS is REQUIRED for any non-loopback bind. The chart binds
# the container to plain HTTP on the Service port because TLS is expected to be
# terminated by the Ingress / service mesh in front of it. Enable the optional
# Ingress block below to wire a TLS-terminating gateway, or place an external
# auth proxy / mesh in the path.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: diagnostics.example.internal
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # - secretName: diagnostics-orchestrator-tls
  #   hosts:
  #     - diagnostics.example.internal

# Optional NetworkPolicy gating ingress to the orchestrator. Default off so the
# chart doesn't break clusters without a NetworkPolicy controller; enable in
# any environment with one (Calico, Cilium, etc.) for defense in depth.
networkPolicy:
  enabled: false
  # When non-empty, only Pods in these namespaces (matched by
  # `kubernetes.io/metadata.name`) may reach the orchestrator on its Service
  # port. Empty == allow from any namespace within the cluster.
  fromNamespaces: []
  # When non-empty, additionally narrows ingress to Pods bearing these labels.
  fromPodLabels: {}
