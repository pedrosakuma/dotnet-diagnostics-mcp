{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "dotnet-diagnostics-orchestrator.fullname" . }}
  labels:
    {{- include "dotnet-diagnostics-orchestrator.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "dotnet-diagnostics-orchestrator.serviceAccountName" . }}
    namespace: {{ include "dotnet-diagnostics-orchestrator.namespace" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "dotnet-diagnostics-orchestrator.fullname" . }}
{{- end }}
