apiVersion: v1
kind: Pod
metadata:
  name: {{ include "dotnet-diagnostics-orchestrator.fullname" . }}-healthcheck
  namespace: {{ include "dotnet-diagnostics-orchestrator.namespace" . }}
  labels:
    {{- include "dotnet-diagnostics-orchestrator.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.7.1
      # The server allow-lists `/health` from bearer auth (see
      # `BearerTokenMiddleware`), so this probe deliberately does not present
      # a token. This keeps the test working for both the legacy single-bearer
      # shape and the scoped `bearerTokens` shape (RFC 0001 §6), where there
      # may be no chart-managed Secret to read a token from.
      command:
        - /bin/sh
        - -ec
      args:
        - >-
          curl -fsS
          http://{{ include "dotnet-diagnostics-orchestrator.fullname" . }}:{{ .Values.service.port }}/health
          >/dev/null
