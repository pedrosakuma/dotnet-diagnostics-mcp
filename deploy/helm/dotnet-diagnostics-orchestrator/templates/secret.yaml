{{- /*
H1 guard (issue #162) + B5.5 (issue #186): refuse to render a Secret carrying
the public placeholder token. Either set `bearerToken.value` to a real random
secret (e.g. `openssl rand -hex 32`) or provide `bearerToken.existingSecret`
referencing a pre-created Kubernetes Secret with a `token` key.

When the operator has migrated to the scoped `bearerTokens` list (RFC 0001 §6)
AND left `bearerToken.value` at its public placeholder, we treat that as the
"scoped-only" deployment shape: the H1 placeholder check is skipped, the legacy
Secret is NOT rendered, and the deployment skips the matching `MCP_BEARER_TOKEN`
env var. Scoped bearer values live in an out-of-band multi-key Secret
referenced by `bearerTokens[*].valueFrom.secretKeyRef` (see
`deploy/helm/README.md`).

When both shapes are set (scoped `bearerTokens` AND a real `bearerToken.value`
or `bearerToken.existingSecret`), both render — the server logs a startup
warning that the scoped registry wins and `MCP_BEARER_TOKEN` is ignored
(RFC §7.1, B5.1 #188).
*/ -}}
{{- $hasScoped := gt (len .Values.bearerTokens) 0 -}}
{{- $hasOidc := .Values.oidc.enabled -}}
{{- $legacyOverridden := or (ne .Values.bearerToken.existingSecret "") (and (ne .Values.bearerToken.value "") (ne .Values.bearerToken.value "replace-me-with-a-strong-random-token")) -}}
{{- if not $legacyOverridden }}
{{- if and (not $hasScoped) (not $hasOidc) }}
{{- if eq .Values.bearerToken.value "replace-me-with-a-strong-random-token" }}
{{- fail "bearerToken.value is still the public placeholder 'replace-me-with-a-strong-random-token'. Set --set bearerToken.value=$(openssl rand -hex 32) or --set bearerToken.existingSecret=<name-of-existing-secret> before installing, or migrate to the scoped bearerTokens list (see deploy/helm/README.md)." }}
{{- else }}
{{- fail "bearerToken.value is empty and bearerToken.existingSecret is not set. Provide one of them before installing, or migrate to the scoped bearerTokens list (see deploy/helm/README.md)." }}
{{- end }}
{{- end }}
{{- end }}
{{- if and $legacyOverridden (not .Values.bearerToken.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dotnet-diagnostics-orchestrator.secretName" . }}
  namespace: {{ include "dotnet-diagnostics-orchestrator.namespace" . }}
  labels:
    {{- include "dotnet-diagnostics-orchestrator.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ .Values.bearerToken.value | quote }}
{{- end }}
