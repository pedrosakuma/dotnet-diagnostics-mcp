{{- /*
H1 guard (issue #162): refuse to render a Secret carrying the public placeholder
token. Either set `bearerToken.value` to a real random secret (e.g.
`openssl rand -hex 32`) or provide `bearerToken.existingSecret` referencing a
pre-created Kubernetes Secret with a `token` key.
*/ -}}
{{- if and (not .Values.bearerToken.existingSecret) (eq .Values.bearerToken.value "replace-me-with-a-strong-random-token") }}
{{- fail "bearerToken.value is still the public placeholder 'replace-me-with-a-strong-random-token'. Set --set bearerToken.value=$(openssl rand -hex 32) or --set bearerToken.existingSecret=<name-of-existing-secret> before installing." }}
{{- end }}
{{- if and (not .Values.bearerToken.existingSecret) (not .Values.bearerToken.value) }}
{{- fail "bearerToken.value is empty and bearerToken.existingSecret is not set. Provide one of them before installing." }}
{{- end }}
{{- if not .Values.bearerToken.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dotnet-diagnostics-orchestrator.secretName" . }}
  namespace: {{ include "dotnet-diagnostics-orchestrator.namespace" . }}
  labels:
    {{- include "dotnet-diagnostics-orchestrator.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ .Values.bearerToken.value | quote }}
{{- end }}
