apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dotnet-diagnostics-orchestrator.fullname" . }}
  namespace: {{ include "dotnet-diagnostics-orchestrator.namespace" . }}
  labels:
    {{- include "dotnet-diagnostics-orchestrator.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "dotnet-diagnostics-orchestrator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dotnet-diagnostics-orchestrator.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: orchestrator
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "dotnet-diagnostics-orchestrator.serviceAccountName" . }}
      automountServiceAccountToken: true
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: orchestrator
          image: {{ include "dotnet-diagnostics-orchestrator.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # `--urls` is the highest-precedence binding source in
          # WebApplication.CreateBuilder, so it overrides the appsettings.json
          # "Urls" key the local-dev image ships with (which would otherwise
          # bind to 127.0.0.1:8787 — invisible to the kubelet's probes and to
          # the in-cluster Service).
          args:
            - "--urls"
            - {{ printf "http://0.0.0.0:%v" .Values.service.port | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          env:
            - name: ASPNETCORE_URLS
              value: {{ printf "http://0.0.0.0:%v" .Values.service.port | quote }}
            - name: Observability__MetricsEnabled
              value: {{ ternary "true" "false" .Values.metrics.enabled | quote }}
            - name: MCP_METRICS_OPEN
              value: {{ ternary "true" "false" .Values.metrics.open | quote }}
            {{- /*
            Legacy single-bearer wiring. Rendered only when the operator has
            opted into the legacy `bearerToken` block (existingSecret set, or
            an explicit non-placeholder value). When the operator has migrated
            to the scoped `bearerTokens` list and left `bearerToken` at its
            defaults, secret.yaml skips rendering the legacy Secret and we
            must skip the env ref here too — otherwise the Pod would fail to
            start with "secret not found".

            When BOTH legacy and scoped are configured at the same time the
            scoped registry wins at runtime; the server emits a startup
            warning naming the ignored MCP_BEARER_TOKEN (RFC 0001 §7.1).
            */ -}}
            {{- $hasLegacyBearer := or (ne .Values.bearerToken.existingSecret "") (and (ne .Values.bearerToken.value "") (ne .Values.bearerToken.value "replace-me-with-a-strong-random-token")) }}
            {{- if $hasLegacyBearer }}
            - name: MCP_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "dotnet-diagnostics-orchestrator.secretName" . }}
                  key: token
            {{- end }}
            {{- /*
            Scoped bearer tokens per RFC 0001 §6. Each entry expands to one
            `__Name`, one `__Token` (valueFrom: secretKeyRef), and one
            `__Scopes__{j}` env var per scope. `BearerTokenRegistry` (B5.1
            #188) parses `Auth:BearerTokens` from this exact shape.
            */ -}}
            {{- range $i, $entry := .Values.bearerTokens }}
            {{- if or (not $entry.name) (eq (toString $entry.name) "") }}
            {{- fail (printf "bearerTokens[%d] is missing a non-empty `name`" $i) }}
            {{- end }}
            {{- if not $entry.valueFrom }}
            {{- fail (printf "bearerTokens[%d] (%s) is missing `valueFrom.secretKeyRef`" $i $entry.name) }}
            {{- end }}
            {{- if not $entry.valueFrom.secretKeyRef }}
            {{- fail (printf "bearerTokens[%d] (%s) requires `valueFrom.secretKeyRef` (literal token values are not accepted — store them in a Kubernetes Secret)" $i $entry.name) }}
            {{- end }}
            {{- $sref := $entry.valueFrom.secretKeyRef }}
            {{- $srefName := default "" $sref.name }}
            {{- $srefKey := default "" $sref.key }}
            {{- if or (eq (toString $srefName | trim) "") (eq (toString $srefKey | trim) "") }}
            {{- fail (printf "bearerTokens[%d] (%s) `valueFrom.secretKeyRef` must set both a non-empty `name` and a non-empty `key`" $i $entry.name) }}
            {{- end }}
            {{- if or (not $entry.scopes) (eq (len $entry.scopes) 0) }}
            {{- fail (printf "bearerTokens[%d] (%s) must declare at least one scope" $i $entry.name) }}
            {{- end }}
            {{- range $j, $scope := $entry.scopes }}
            {{- if eq (toString (default "" $scope) | trim) "" }}
            {{- fail (printf "bearerTokens[%d] (%s) scopes[%d] is empty; every scope must be a non-empty string (see RFC 0001 §2 for the taxonomy)" $i $entry.name $j) }}
            {{- end }}
            {{- end }}
            - name: {{ printf "Auth__BearerTokens__%d__Name" $i }}
              value: {{ $entry.name | quote }}
            - name: {{ printf "Auth__BearerTokens__%d__Token" $i }}
              valueFrom:
                secretKeyRef:
                  name: {{ $srefName | quote }}
                  key: {{ $srefKey | quote }}
            {{- range $j, $scope := $entry.scopes }}
            - name: {{ printf "Auth__BearerTokens__%d__Scopes__%d" $i $j }}
              value: {{ $scope | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.oidc.enabled }}
            {{- if eq (toString (default "" .Values.oidc.issuer) | trim) "" }}
            {{- fail "oidc.enabled=true requires a non-empty oidc.issuer" }}
            {{- end }}
            {{- if eq (toString (default "" .Values.oidc.audience) | trim) "" }}
            {{- fail "oidc.enabled=true requires a non-empty oidc.audience" }}
            {{- end }}
            - name: MCP_OIDC_ISSUER
              value: {{ .Values.oidc.issuer | quote }}
            - name: MCP_OIDC_AUDIENCE
              value: {{ .Values.oidc.audience | quote }}
            {{- if ne (toString (default "" .Values.oidc.scopeClaim) | trim) "" }}
            - name: MCP_OIDC_SCOPE_CLAIM
              value: {{ .Values.oidc.scopeClaim | quote }}
            {{- end }}
            {{- if ne (toString (default "" .Values.oidc.requiredClaimsJson) | trim) "" }}
            - name: MCP_OIDC_REQUIRED_CLAIMS_JSON
              value: {{ .Values.oidc.requiredClaimsJson | quote }}
            {{- end }}
            {{- end }}
            - name: Orchestrator__Enabled
              value: {{ ternary "true" "false" .Values.orchestrator.enabled | quote }}
            - name: Orchestrator__DefaultNamespace
              value: {{ include "dotnet-diagnostics-orchestrator.defaultNamespace" . | quote }}
            {{- if gt (len .Values.orchestrator.allowedNamespaces) 0 }}
            {{- range $i, $ns := .Values.orchestrator.allowedNamespaces }}
            - name: {{ printf "Orchestrator__NamespaceAllowlist__%d" $i }}
              value: {{ $ns | quote }}
            {{- end }}
            {{- else }}
            - name: Orchestrator__NamespaceAllowlist__0
              value: {{ include "dotnet-diagnostics-orchestrator.namespace" . | quote }}
            {{- end }}
            {{- range $i, $label := .Values.orchestrator.labelKeyAllowlist }}
            - name: {{ printf "Orchestrator__LabelKeyAllowlist__%d" $i }}
              value: {{ $label | quote }}
            {{- end }}
            - name: Orchestrator__PreparedLabelKey
              value: {{ .Values.orchestrator.preparedLabelKey | quote }}
            - name: Orchestrator__RequirePreparedLabel
              value: {{ ternary "true" "false" .Values.orchestrator.requirePreparedLabel | quote }}
            - name: Orchestrator__EphemeralContainerImage
              value: {{ include "dotnet-diagnostics-orchestrator.ephemeralImage" . | quote }}
            - name: Orchestrator__AttachReadinessTimeoutSeconds
              value: {{ .Values.orchestrator.attachReadinessTimeoutSeconds | quote }}
            - name: Orchestrator__DefaultInvestigationTtlSeconds
              value: {{ .Values.orchestrator.defaultInvestigationTtlSeconds | quote }}
            - name: Orchestrator__ProxyPodPort
              value: {{ .Values.orchestrator.proxyPodPort | quote }}
            - name: Orchestrator__AllowCrossSessionAdmin
              value: {{ ternary "true" "false" .Values.orchestrator.allowCrossSessionAdmin | quote }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- with .Values.extraVolumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.extraVolumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
