apiVersion: apps/v1
kind: Deployment
metadata:
  name: dotnet-diagnostics-orchestrator
  namespace: diagnosticsmcp-system
  labels:
    app.kubernetes.io/name: dotnet-diagnostics-orchestrator
    app.kubernetes.io/component: orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dotnet-diagnostics-orchestrator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dotnet-diagnostics-orchestrator
        app.kubernetes.io/component: orchestrator
    spec:
      serviceAccountName: dotnet-diagnostics-orchestrator
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: orchestrator
          image: ghcr.io/pedrosakuma/dotnet-diagnostics-mcp:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5130
          env:
            - name: ASPNETCORE_URLS
              value: http://0.0.0.0:5130
            - name: MCP_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: dotnet-diagnostics-orchestrator-bearer
                  key: token
            - name: Orchestrator__Enabled
              value: "true"
            - name: Orchestrator__DefaultNamespace
              value: replace-me-with-target-namespace
            - name: Orchestrator__NamespaceAllowlist__0
              value: replace-me-with-target-namespace
            - name: Orchestrator__LabelKeyAllowlist__0
              value: diagnostics.dotnet.io/prepared
            - name: Orchestrator__LabelKeyAllowlist__1
              value: app
            - name: Orchestrator__LabelKeyAllowlist__2
              value: app.kubernetes.io/name
            - name: Orchestrator__PreparedLabelKey
              value: diagnostics.dotnet.io/prepared
            - name: Orchestrator__RequirePreparedLabel
              value: "true"
            - name: Orchestrator__EphemeralContainerImage
              value: ghcr.io/pedrosakuma/dotnet-diagnostics-mcp:latest
            - name: Orchestrator__AttachReadinessTimeoutSeconds
              value: "60"
            - name: Orchestrator__DefaultInvestigationTtlSeconds
              value: "1800"
            - name: Orchestrator__ProxyPodPort
              value: "5130"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            # The orchestrator is mostly I/O-bound (Kubernetes API + proxy streams) with a
            # small steady-state heap. Leave burst headroom for transient attach bookkeeping
            # and long-running dump / trace responses flowing through the reverse proxy.
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
