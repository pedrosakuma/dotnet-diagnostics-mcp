apiVersion: apps/v1
kind: Deployment
metadata:
  name: dotnet-diagnostics-orchestrator
  namespace: diagnosticsmcp-system
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: orchestrator
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
