# Central orchestrator RBAC — namespace-scoped (default, recommended).
# Single-namespace tenants get a Role+RoleBinding. For multi-namespace
# observation, swap this file for a ClusterRole+ClusterRoleBinding overlay.
# `pods/portforward` requires both `get` and `create`: the Kubernetes API
# uses an HTTP GET that upgrades to a WebSocket (HTTP 101) for the
# in-process port-forward stream in KubernetesPortForwardManager.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dotnet-diagnostics-orchestrator
  namespace: diagnosticsmcp-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dotnet-diagnostics-orchestrator
  namespace: diagnosticsmcp-system
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/ephemeralcontainers"]
    verbs: ["update", "patch"]
  - apiGroups: [""]
    resources: ["pods/portforward"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dotnet-diagnostics-orchestrator
  namespace: diagnosticsmcp-system
subjects:
  - kind: ServiceAccount
    name: dotnet-diagnostics-orchestrator
    namespace: diagnosticsmcp-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dotnet-diagnostics-orchestrator
