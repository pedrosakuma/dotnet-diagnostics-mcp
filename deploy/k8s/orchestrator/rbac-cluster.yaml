# Central orchestrator RBAC — CLUSTER-SCOPED (opt-in).
#
# Apply this INSTEAD of rbac.yaml when the orchestrator must observe and attach
# to Pods across multiple namespaces. Cluster-scoped permissions widen the
# blast radius if the bearer token is compromised — only use it when the
# multi-namespace requirement is real.
#
# This file still depends on the ServiceAccount declared in rbac.yaml. Apply
# rbac.yaml first (for the ServiceAccount) OR copy the ServiceAccount block in.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dotnet-diagnostics-orchestrator
  namespace: diagnosticsmcp-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dotnet-diagnostics-orchestrator
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/ephemeralcontainers"]
    verbs: ["update", "patch"]
  - apiGroups: [""]
    resources: ["pods/portforward"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dotnet-diagnostics-orchestrator
subjects:
  - kind: ServiceAccount
    name: dotnet-diagnostics-orchestrator
    namespace: diagnosticsmcp-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dotnet-diagnostics-orchestrator
