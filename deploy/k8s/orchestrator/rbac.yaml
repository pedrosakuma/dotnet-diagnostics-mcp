# Central orchestrator RBAC — namespace-scoped (default, recommended).
#
# This is the safer default: the orchestrator's ServiceAccount only has
# pods get/list/watch, pods/ephemeralcontainers update/patch, and
# pods/portforward get/create within `diagnosticsmcp-system`. If you need
# multi-namespace observation / attach, apply `rbac-cluster.yaml` instead.
#
# Update both metadata.namespace fields below if you install into a different
# namespace, or prefer the Kustomize / Helm surfaces (`rbac.scope=namespace`)
# which wire that automatically.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dotnet-diagnostics-orchestrator
  namespace: diagnosticsmcp-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dotnet-diagnostics-orchestrator
  namespace: diagnosticsmcp-system
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/ephemeralcontainers"]
    verbs: ["update", "patch"]
  - apiGroups: [""]
    resources: ["pods/portforward"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dotnet-diagnostics-orchestrator
  namespace: diagnosticsmcp-system
subjects:
  - kind: ServiceAccount
    name: dotnet-diagnostics-orchestrator
    namespace: diagnosticsmcp-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dotnet-diagnostics-orchestrator
