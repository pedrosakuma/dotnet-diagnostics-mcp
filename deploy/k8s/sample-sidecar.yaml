# Example: deploy dotnet-diagnostics-mcp as a sidecar next to a .NET 10 web API.
#
# Key pod-level requirements that make the diagnostic IPC attach work:
#   * shareProcessNamespace: true  -> the sidecar can see the app's PIDs
#   * shared emptyDir over /tmp    -> both containers see the same
#                                     /tmp/dotnet-diagnostic-<pid> socket
#   * matching UID/GID on both     -> the diagnostic socket created by the
#     containers (or fsGroup)        target app inherits its UID; the sidecar
#                                     must be able to open it. Easiest path:
#                                     run BOTH containers with the same
#                                     runAsUser, or set pod-level fsGroup so
#                                     the shared volume is group-readable.
#
# Neither the target app's image nor its code needs any modification.
#
# To rotate the bearer token, edit the Secret and restart the pod.
apiVersion: v1
kind: Namespace
metadata:
  name: diagnosticsmcp-demo
---
apiVersion: v1
kind: Secret
metadata:
  name: diagnosticsmcp-bearer
  namespace: diagnosticsmcp-demo
type: Opaque
stringData:
  # Replace with `openssl rand -hex 32` output. Never commit a real token.
  token: "replace-me-with-a-strong-random-token"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-api
  namespace: diagnosticsmcp-demo
  labels:
    app: sample-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-api
  template:
    metadata:
      labels:
        app: sample-api
    spec:
      # Required so the sidecar's DiagnosticsClient.GetPublishedProcesses()
      # can see the target process and connect to its diagnostic socket.
      shareProcessNamespace: true

      # Pin both containers to the same non-root UID/GID so the diagnostic
      # IPC socket (created by the app at /tmp/dotnet-diagnostic-<pid>) is
      # readable by the sidecar. Override per-container below if needed.
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001

      volumes:
        # Shared emptyDir mounted at /tmp in both containers; .NET creates the
        # diagnostic IPC socket at /tmp/dotnet-diagnostic-<pid> on Linux, so
        # mounting the same volume gives the sidecar access to it.
        - name: diag-tmp
          emptyDir: {}

      containers:
        # ----- 1. Target application (replace with your own image) -----
        - name: app
          image: ghcr.io/example/sample-api:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: ASPNETCORE_URLS
              value: http://0.0.0.0:8080
            # Required for EventPipe/diagnostic IPC. Default is 1 but be explicit.
            - name: DOTNET_EnableDiagnostics
              value: "1"
          volumeMounts:
            - name: diag-tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi

        # ----- 2. dotnet-diagnostics-mcp sidecar -----
        - name: diagnosticsmcp
          image: ghcr.io/pedrosakuma/dotnet-diagnostics-mcp:0.3.1
          imagePullPolicy: IfNotPresent
          # ClrMD-backed tools (collect_thread_snapshot, inspect_live_heap,
          # inspect_dump on live PIDs, collect_process_dump) attach via
          # ptrace(2). Matching UIDs is NOT enough on Linux when the host's
          # kernel.yama.ptrace_scope is 1 (Debian/Ubuntu default). Grant
          # CAP_SYS_PTRACE so the sidecar can attach to its same-pod peer.
          # EventPipe-only tools (counters, cpu_sample, exceptions, gc) do
          # not need it.
          securityContext:
            capabilities:
              add:
                - SYS_PTRACE
          ports:
            - containerPort: 8080
              name: mcp
          env:
            - name: ASPNETCORE_URLS
              value: http://0.0.0.0:8080
            - name: MCP_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: diagnosticsmcp-bearer
                  key: token
            # Optional: point symbol resolution at a writable shared cache such as
            # /var/cache/mcp/symbols, for example:
            # - name: MCP_SYMBOL_PATH
            #   value: srv*/var/cache/mcp/symbols*https://msdl.microsoft.com/download/symbols
            # Mount that cache from an emptyDir or PVC if you enable symbol servers.
            # Optional: when the sidecar image is replaced (rolling update of just
            # the sidecar container), the watcher detects the on-disk MVID drift
            # and asks Kubernetes to restart the pod so the new build is loaded.
            # Without this the sidecar process keeps serving the previous build
            # until something else recycles it. See issue #75.
            - name: DOTNET_DIAGNOSTICS_MCP_AUTO_RESTART
              value: "true"
          volumeMounts:
            # Sees the same /tmp as the app, including the diagnostic socket.
            - name: diag-tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            # Diagnostic captures can be allocation-heavy briefly; cap to protect
            # the noisy-neighbour scenario but leave room for traces.
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: sample-api-diagnosticsmcp
  namespace: diagnosticsmcp-demo
  labels:
    app: sample-api
spec:
  type: ClusterIP
  selector:
    app: sample-api
  ports:
    - name: mcp
      port: 8787
      targetPort: mcp
